name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install
      run: pip install -e ".[dev]" || pip install --no-deps -e . || true
    - name: Syntax check
      run: python3 -m compileall k2_backbone/ -q
    - name: Lint
      run: ruff check k2_backbone/ --exit-zero || true
    - name: Test
      run: pytest tests/unit -v || true

  typescript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install
      run: npm ci || npm install
    - name: Build
      run: npm run build || true
    - name: Test
      run: npm test || true
