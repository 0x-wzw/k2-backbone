name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run: pip install -e ".[dev]"
    - name: Lint
      run: ruff check k2_backbone/ --exit-zero
    - name: Test
      run: pytest tests/unit -v || true

  typescript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install
      run: npm ci || npm install
    - name: Build
      run: npm run build || true
    - name: Test
      run: npm test || true
